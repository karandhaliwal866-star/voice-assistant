<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NOVA — AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050308;
    --bg-2:#0b0716;
    --magenta:#ff2e8c;
    --cyan:#2af5e0;
    --gold:#ffcf5c;
    --violet:#8b5cf6;
    --text:#f1eefc;
    --muted:#9a97b3;
    --danger:#ff4d4d;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100dvh;
    overflow-x:hidden;
  }

  body{
    background:
      radial-gradient(60% 40% at 50% 0%, rgba(139,92,246,0.18), transparent 70%),
      radial-gradient(60% 50% at 50% 100%, rgba(255,46,140,0.12), transparent 70%),
      var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px 40px;
  }

  .page{
    width:100%;
    max-width:1100px;
    display:grid;
    grid-template-columns:1fr;
    gap:28px;
    place-items:center;
    text-align:center;
  }

  .stage{
    position:relative;
    width:100%;
    max-width:460px;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 0 1px rgba(255,255,255,0.06), 0 30px 80px -20px rgba(255,46,140,0.25), 0 30px 80px -30px rgba(42,245,224,0.15);
  }

  .stage img{
    display:block;
    width:100%;
    height:auto;
  }

  .stage::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(5,3,8,0) 55%, rgba(5,3,8,0.85) 100%);
    pointer-events:none;
  }

  .control{
    position:absolute;
    left:50%;
    top:78.5%;
    transform:translate(-50%,-50%);
    z-index:2;
  }

  .orb-btn{
    --ring: conic-gradient(from 0deg, var(--magenta), var(--gold), var(--cyan), var(--violet), var(--magenta));
    position:relative;
    width:19vw;
    max-width:88px;
    min-width:64px;
    aspect-ratio:1/1;
    border-radius:50%;
    border:none;
    cursor:pointer;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg-2);
    isolation:isolate;
  }

  .orb-btn::before{
    content:"";
    position:absolute;
    inset:-4px;
    border-radius:50%;
    background:var(--ring);
    z-index:-2;
    animation:spin 4s linear infinite;
  }

  .orb-btn::after{
    content:"";
    position:absolute;
    inset:3px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #14101f, var(--bg-2) 70%);
    z-index:-1;
  }

  .orb-btn .core{
    width:34%;
    height:34%;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, var(--cyan) 45%, var(--magenta) 100%);
    box-shadow:0 0 18px 2px rgba(42,245,224,0.65);
    transition:all .35s ease;
  }

  .orb-btn.active .core{
    background:radial-gradient(circle at 35% 30%, #fff, var(--magenta) 45%, var(--violet) 100%);
    box-shadow:0 0 22px 4px rgba(255,46,140,0.7);
    animation:pulse 1.6s ease-in-out infinite;
  }

  .orb-btn.active::before{ animation-duration:1.6s; }

  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.18); }
  }

  .status-wrap{
    position:absolute;
    left:50%;
    top:90%;
    transform:translate(-50%,-50%);
    width:100%;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    min-height:36px;
  }

  .status-label{
    font-family:'Orbitron',sans-serif;
    font-weight:700;
    font-size:clamp(12px,3.4vw,16px);
    letter-spacing:0.14em;
    text-transform:uppercase;
    opacity:0;
    transform:translateY(6px);
    transition:opacity .3s ease, transform .3s ease, color .3s ease;
  }

  .status-label.show{ opacity:1; transform:translateY(0); }
  .status-label.listening{ color:var(--cyan); text-shadow:0 0 12px rgba(42,245,224,0.8); }
  .status-label.thinking{ color:var(--gold); text-shadow:0 0 12px rgba(255,207,92,0.8); }
  .status-label.speaking{ color:var(--magenta); text-shadow:0 0 12px rgba(255,46,140,0.8); }

  .dots{ display:inline-flex; gap:4px; }
  .dots span{
    width:5px; height:5px; border-radius:50%;
    background:currentColor;
    opacity:.3;
    animation:blink 1.2s infinite;
  }
  .dots span:nth-child(2){ animation-delay:.2s; }
  .dots span:nth-child(3){ animation-delay:.4s; }
  @keyframes blink{ 0%,80%,100%{ opacity:.25; } 40%{ opacity:1; } }

  .caption{
    max-width:480px;
    color:var(--muted);
    font-size:14px;
    line-height:1.6;
    padding:0 8px;
  }

  .caption strong{ color:var(--text); }

  .hint{
    font-family:'Orbitron',sans-serif;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--muted);
  }

  .unsupported{
    display:none;
    color:var(--danger);
    font-size:13px;
    max-width:420px;
  }

  @media (max-width:420px){
    .control{ top:78%; }
    .status-wrap{ top:89%; }
  }
</style>
</head>
<body>

  <div class="page">
    <div class="stage">
      <img src="1784441715962.png" alt="NOVA — AI activation portal">

      <div class="control">
        <button class="orb-btn" id="orbBtn" aria-pressed="false" aria-label="Activate Nova">
          <span class="core"></span>
        </button>
      </div>

      <div class="status-wrap">
        <div class="status-label" id="statusLabel"></div>
      </div>
    </div>

    <p class="caption">
      Tap the core to bring <strong>NOVA</strong> online. She'll listen while you speak, think while she works it out, and speak her answer back to you.
    </p>
    <p class="unsupported" id="unsupported">
      Your browser doesn't support voice recognition (try Chrome or Edge). You can still see NOVA's activation states, but voice input won't work here.
    </p>
  </div>

<script>
(function(){
  const orbBtn = document.getElementById('orbBtn');
  const statusLabel = document.getElementById('statusLabel');
  const unsupportedMsg = document.getElementById('unsupported');

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const synth = window.speechSynthesis;

  let recognition = null;
  let isActive = false;
  let manualStop = false;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
  } else {
    unsupportedMsg.style.display = 'block';
  }

  function setStatus(text, cls){
    statusLabel.textContent = '';
    statusLabel.className = 'status-label show ' + (cls || '');
    if (text) {
      const span = document.createElement('span');
      span.textContent = text + ' ';
      statusLabel.appendChild(span);
    }
  }

  function addDots(){
    const dots = document.createElement('span');
    dots.className = 'dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    statusLabel.appendChild(dots);
  }

  function clearStatus(){
    statusLabel.className = 'status-label';
    statusLabel.textContent = '';
  }

  // ---- Replace this with a real call to your AI backend ----
  // It receives the recognized speech text and must resolve with a reply string.
  function getNovaReply(userText){
    return new Promise((resolve) => {
      setTimeout(() => {
        resolve("You said: " + userText + ". I'm still connected to a placeholder brain — wire me up to your AI backend to give real answers.");
      }, 1400); // simulated "thinking" time
    });
  }
  // ------------------------------------------------------------

  function startListening(){
    if (!isActive) return;
    if (!recognition){
      setStatus('Voice input unavailable', '');
      return;
    }
    setStatus('Listening', 'listening');
    addDots();
    try { recognition.start(); } catch(e) { /* already started */ }
  }

  function goInactive(){
    isActive = false;
    orbBtn.classList.remove('active');
    orbBtn.setAttribute('aria-pressed', 'false');
    orbBtn.setAttribute('aria-label', 'Activate Nova');
    clearStatus();
    if (recognition) { manualStop = true; recognition.stop(); }
    if (synth) synth.cancel();
  }

  function goActive(){
    isActive = true;
    orbBtn.classList.add('active');
    orbBtn.setAttribute('aria-pressed', 'true');
    orbBtn.setAttribute('aria-label', 'Deactivate Nova');
    startListening();
  }

  orbBtn.addEventListener('click', () => {
    if (isActive) {
      goInactive();
    } else {
      goActive();
    }
  });

  if (recognition){
    recognition.onresult = async (event) => {
      const heard = event.results[0][0].transcript;

      setStatus('Thinking', 'thinking');
      addDots();

      const reply = await getNovaReply(heard);

      if (!isActive) return; // user deactivated while thinking

      setStatus('Speaking', 'speaking');

      if (synth){
        const utter = new SpeechSynthesisUtterance(reply);
        utter.onend = () => { if (isActive) startListening(); };
        synth.speak(utter);
      } else {
        setTimeout(() => { if (isActive) startListening(); }, 1200);
      }
    };

    recognition.onerror = () => {
      if (isActive && !manualStop) {
        setTimeout(startListening, 600);
      }
      manualStop = false;
    };

    recognition.onend = () => {
      // If still active and not mid thinking/speaking, keep the loop going
      if (isActive && !manualStop && statusLabel.classList.contains('listening')) {
        setTimeout(startListening, 300);
      }
      manualStop = false;
    };
  }
})();
</script>

</body>
    </html>
