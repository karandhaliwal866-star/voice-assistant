<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA AI - Core Control System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Full-screen setup for your custom background image */
            background: url('/static/nova_bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-top: 20px;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
        }

        header h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            color: #00f2fe;
        }

        /* High-Visibility Neon Status Bar */
        .status-monitor {
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(0, 242, 254, 0.4);
            border-radius: 30px;
            padding: 10px 40px;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #888;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        /* Dynamic Glow Animations for AI States */
        .status-monitor.listening {
            color: #2bef86;
            border-color: #2bef86;
            box-shadow: 0 0 20px rgba(43, 239, 134, 0.4);
            animation: pulseGlow 1.5s infinite alternate;
        }

        .status-monitor.thinking {
            color: #ffb703;
            border-color: #ffb703;
            box-shadow: 0 0 20px rgba(255, 183, 3, 0.4);
            animation: pulseGlow 1.5s infinite alternate;
        }

        .status-monitor.speaking {
            color: #00f2fe;
            border-color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            animation: pulseGlow 1.5s infinite alternate;
        }

        @keyframes pulseGlow {
            from { opacity: 0.8; }
            to { opacity: 1; box-shadow: 0 0 30px currentcolor; }
        }

        /* Shield & Dynamic Toggle Button Layout */
        .shield-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Perfectly preserves space for the robot portal graphics behind it */
        .shield-spacer {
            height: 380px; 
            width: 100%;
        }

        .nova-toggle-btn {
            font-size: 1.2rem;
            padding: 15px 45px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            color: white;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-activate {
            background: linear-gradient(45deg, #0072ff, #00f2fe);
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.4);
        }

        .btn-deactivate {
            background: linear-gradient(45deg, #d00000, #ff0055);
            box-shadow: 0 4px 20px rgba(255, 0, 85, 0.4);
        }

        .main-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            padding: 30px 20px;
        }

        .glass-panel {
            background: rgba(10, 15, 30, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 254, 0.25);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
        }

        .chat-box {
            display: flex;
            flex-direction: column;
            height: 300px;
        }

        .chat-logs {
            flex: 1;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00f2fe;
            border-radius: 8px;
            padding: 12px;
            color: white;
            outline: none;
        }

        button.send-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>NOVA SYSTEM CORE</h1>
    </header>

    <!-- Top Status Bar Area -->
    <div class="status-monitor" id="statusMonitor">SYSTEM IDLE</div>

    <!-- Center Space for Shield Image and Main Controller Action Button -->
    <div class="shield-wrapper">
        <div class="shield-spacer"></div>
        <button id="toggleBtn" class="nova-toggle-btn btn-activate" onclick="toggleNova()">Activate Nova</button>
    </div>

    <div class="main-container">
        <!-- Terminal Logs Dashboard Overlay -->
        <div class="glass-panel chat-box">
            <h3>🧠 TERMINAL LOGS</h3>
            <div class="chat-logs" id="chatLogs">
                <p style="color: rgba(255,255,255,0.5);">[System]: Standby mode. Click Activate to power up engine cores...</p>
            </div>
            <div class="input-group">
                <input type="text" id="userInput" placeholder="Enter override commands here...">
                <button class="send-btn" onclick="sendTextCommand()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let isNovaActive = false;
        const statusMonitor = document.getElementById('statusMonitor');
        const toggleBtn = document.getElementById('toggleBtn');
        const logs = document.getElementById('chatLogs');

        function toggleNova() {
            if (!isNovaActive) {
                // Initialize System Engine
                isNovaActive = true;
                toggleBtn.textContent = "Deactivate Nova";
                toggleBtn.className = "nova-toggle-btn btn-deactivate";
                
                runNovaAIStateLoop();
            } else {
                // Safe Interruption / Shutdown Routine
                isNovaActive = false;
                toggleBtn.textContent = "Activate Nova";
                toggleBtn.className = "nova-toggle-btn btn-activate";
                
                statusMonitor.textContent = "SYSTEM IDLE";
                statusMonitor.className = "status-monitor";
                logs.innerHTML += `<p style="color: #ff0055;"><b>[System]:</b> Nova AI Core Stopped.</p>`;
            }
        }

        function runNovaAIStateLoop() {
            if (!isNovaActive) return;

            // State 1: Listening
            statusMonitor.textContent = "🎙️ LISTENING...";
            statusMonitor.className = "status-monitor listening";
            logs.innerHTML += `<p style="color: #2bef86;"><b>[System]:</b> Audio capturing active. Speak now...</p>`;

            // Simulate transition to Thinking after 3 seconds
            setTimeout(() => {
                if (!isNovaActive) return;
                
                // State 2: Thinking
                statusMonitor.textContent = "⚡ THINKING...";
                statusMonitor.className = "status-monitor thinking";
                logs.innerHTML += `<p style="color: #ffb703;"><b>[System]:</b> Processing natural language inputs...</p>`;

                // Simulate transition to Speaking after 2.5 seconds
                setTimeout(() => {
                    if (!isNovaActive) return;

                    // State 3: Speaking
                    statusMonitor.textContent = "🔊 SPEAKING...";
                    statusMonitor.className = "status-monitor speaking";
                    logs.innerHTML += `<p style="color: #00f2fe;"><b>Nova AI:</b> Operational routine sequence confirmed.</p>`;

                    // Reset back to looping cycle once vocal output finishes
                    setTimeout(() => {
                        if (isNovaActive) runNovaAIStateLoop();
                    }, 3000);

                }, 2500);

            }, 3000);
        }

        function sendTextCommand() {
            let input = document.getElementById('userInput');
            if(input.value.trim() === "") return;
            logs.innerHTML += `<p><b>Manual Input:</b> ${input.value}</p>`;
            input.value = "";
            logs.scrollTop = logs.scrollHeight;
        }
    </script>
</body>
</html>
