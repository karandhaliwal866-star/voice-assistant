<!DOCTYPE html>
<html>
<head>
    <title>Nova Core - Immersive Animation</title>
    <style>
        /* --- STYLE SECTION (This is your CSS) --- */
        body {
            margin: 0; background: #020210; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #nova-hub {
            position: relative; width: 400px; height: 400px;
            transition: all 2s ease-in-out;
        }

        /* The Charging Shield (Image 1) */
        #shield-charging {
            position: absolute; width: 100%; height: 100%;
            background: url('1000175041.png') center/contain no-repeat;
            animation: pulse 2s infinite alternate;
        }

        /* The Shatter Frame (Image 2) - Hidden by default */
        #shield-shatter {
            position: absolute; width: 100%; height: 100%;
            background: url('1000175040.png') center/contain no-repeat;
            opacity: 0; transform: scale(0.8);
            pointer-events: none;
        }

        /* The Robot Character */
        #robot {
            position: absolute; width: 120px; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 10;
        }

        /* --- THE ANIMATIONS --- */
        @keyframes pulse {
            from { opacity: 0.7; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1.03); }
        }

        /* Floating Movement Animation */
        @keyframes spaceFloat {
            0% { transform: translate(-50%, -50%); }
            25% { transform: translate(100px, -150px) rotate(10deg); }
            50% { transform: translate(-150px, 50px) rotate(-10deg); }
            75% { transform: translate(120px, 100px) rotate(5deg); }
            100% { transform: translate(-50%, -50%); }
        }

        /* Classes controlled by JavaScript */
        .is-active #shield-charging { display: none; }
        .is-active #shield-shatter { opacity: 1; transform: scale(1.2); transition: 0.3s; opacity: 0; }
        .is-active #robot { animation: spaceFloat 10s infinite ease-in-out; }

        /* Button UI */
        #action-btn {
            position: fixed; bottom: 40px; padding: 15px 30px;
            background: none; border: 2px solid #00d2ff; color: #00d2ff;
            border-radius: 50px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="nova-hub">
        <div id="shield-charging"></div>
        <div id="shield-shatter"></div>
        <img id="robot" src="robot.png" alt="Nova">
    </div>

    <button id="action-btn" onclick="toggleNova()">ACTIVATE NOVA</button>

    <script>
        let active = false;
        function toggleNova() {
            const hub = document.getElementById('nova-hub');
            const btn = document.getElementById('action-btn');
            active = !active;

            if (active) {
                hub.classList.add('is-active');
                btn.innerText = "DEACTIVATE NOVA";
                btn.style.borderColor = "#ff00ff";
                btn.style.color = "#ff00ff";
            } else {
                hub.classList.remove('is-active');
                btn.innerText = "ACTIVATE NOVA";
                btn.style.borderColor = "#00d2ff";
                btn.style.color = "#00d2ff";
            }
        }
    </script>
</body>
</html>
