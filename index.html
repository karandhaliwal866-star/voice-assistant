<!DOCTYPE html>
<html>
<body>

    <input type="text" id="user-input" placeholder="Say something to Nova...">
    <button id="send-btn">Send to Nova</button>
    <p id="response"></p>

    <script>
        document.getElementById("send-btn").addEventListener("click", async () => {
            const message = document.getElementById("user-input").value;

            try {
                // Update this IP address whenever your phone's Wi-Fi IP changes
                const response = await fetch("http://192.168.1.56:5000/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                document.getElementById("response").innerText = data.reply;
            } catch (error) {
                console.error("Connection failed:", error);
                alert("Could not connect to Nova. Check Pydroid IP!");
            }
        });
    </script>
</body>
</html>
