<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova - Voice Assistant</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            font-size: 52px;
            margin: 10px 0 5px;
            text-shadow: 0 0 20px rgba(0, 191, 255, 0.8);
        }
        .subtitle {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 30px;
        }
        #mic-btn, #deactivate-btn {
            padding: 18px 40px;
            font-size: 24px;
            border-radius: 50px;
            margin: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        #mic-btn {
            background: linear-gradient(45deg, #00ff9d, #00b8ff);
            color: #000;
        }
        #mic-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 30px rgba(0, 255, 157, 0.6);
        }
        #deactivate-btn {
            background: #ff2d55;
            color: white;
            display: none; /* Hidden by default */
        }
        #deactivate-btn:hover {
            background: #ff4d6b;
            transform: scale(1.05);
        }
        #status {
            font-size: 22px;
            margin: 30px 0;
            min-height: 50px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .history {
            max-width: 720px;
            margin: 40px auto;
            text-align: left;
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 20px;
            max-height: 420px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .history p {
            margin: 12px 0;
            padding: 10px 14px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
        }
        .listening {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>🎙️ Nova</h1>
    <p class="subtitle">Intelligent Voice Assistant</p>
    
    <button id="mic-btn">Activate Nova</button>
    <button id="deactivate-btn">Deactivate Nova</button>
    
    <p id="status">Ready • Tap Activate to start</p>
    
    <div class="history" id="history"></div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.lang = 'en-IN';

        let conversationHistory = [];
        let isActive = false;

        const micBtn = document.getElementById('mic-btn');
        const deactivateBtn = document.getElementById('deactivate-btn');
        const status = document.getElementById('status');
        const historyDiv = document.getElementById('history');

        function toggleActivate() {
            if (!isActive) {
                isActive = true;
                micBtn.style.display = 'none';
                deactivateBtn.style.display = 'inline-block';
                status.innerText = '✅ Nova Activated • Say something...';
                status.classList.add('listening');
                startListening();
            }
        }

        function deactivate() {
            isActive = false;
            micBtn.style.display = 'inline-block';
            deactivateBtn.style.display = 'none';
            status.innerText = 'Deactivated • Tap Activate to restart';
            status.classList.remove('listening');
            window.speechSynthesis.cancel(); // Stop any speaking
        }

        function startListening() {
            if (!isActive) return;
            status.innerText = '🎤 Listening...';
            recognition.start();
        }

        micBtn.addEventListener('click', toggleActivate);
        deactivateBtn.addEventListener('click', deactivate);

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript.trim();
            addToHistory('You: ' + transcript);
            status.innerText = 'Nova is thinking...';

            try {
                // ←←← CHANGE THIS LINE WITH YOUR NGROK URL
                const response = await fetch('https://YOUR_NGROK_URL_HERE.ngrok-free.app/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: transcript, 
                        history: conversationHistory 
                    })
                });

                if (!response.ok) throw new Error('Backend error');
                const data = await response.json();
                
                const utterance = new SpeechSynthesisUtterance(data.reply);
                utterance.lang = 'en-IN';
                utterance.pitch = 0.95;
                utterance.rate = 0.92;
                window.speechSynthesis.speak(utterance);
                
                addToHistory('Nova: ' + data.reply);
                status.innerText = '✅ Nova Activated • Say something...';
                
                // Auto listen again after reply
                if (isActive) {
                    setTimeout(startListening, 800);
                }
            } catch (err) {
                status.innerText = '❌ Connection error • Check nova_brain.py';
                console.error(err);
            }
        };

        recognition.onerror = () => {
            if (isActive) {
                setTimeout(startListening, 1000);
            }
        };

        function addToHistory(text) {
            conversationHistory.push(text);
            if (conversationHistory.length > 15) conversationHistory.shift();
            historyDiv.innerHTML = conversationHistory.map(msg => `<p>${msg}</p>`).join('');
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }
    </script>
</body>
    </html>
