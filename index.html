<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core Orb Interface</title>
    <style>
        /* Modern Font Reset and Global Styling */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Deep Space Background matching the Orb */
        body {
            background-color: #03011a; 
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Keeps the interface clean */
        }

        /* The Main Viewport Container */
        .app-container {
            flex: 1; /* Takes up all vertical space except the button footer */
            display: grid;
            place-items: center; /* Horizontally and vertically centers the orb */
            position: relative;
            padding: 2rem;
        }

        /* --- THE ORB ARCHITECTURE --- */
        .orb-stack-container {
            position: relative;
            width: 100%;
            max-width: 650px; /* Limits size on large screens */
            display: grid;
            place-items: center; /* Centers all stack elements (Image + Text) */
        }

        /* The Base Layer: Your Generated Image (Image 12) */
        .orb-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 50%; /* Just to keep edges clean */
            z-index: 1; /* Lowest layer */
        }

        /* The Data Layer: The Status Text Container (Center of the Orb) */
        .data-overlay-container {
            grid-area: 1 / 1 / 2 / 2; /* Forces text to occupy the exact same grid space as the image */
            z-index: 5; /* Sit on top of the image */
            display: grid;
            place-items: center; /* Center the text contents */
            width: 30%; /* Limits text size to the inner dark area of the orb */
            height: 30%;
        }

        /* Base Styling for Status Texts (States) */
        .status-text {
            color: #ffffff;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0; /* Default invisible */
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            text-align: center;
            
            /* Apply dynamic text glow */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 
                         0 0 20px rgba(118, 255, 222, 0.6); /* Cyan/Green bias from image */
            
            animation: pulse-glow 2s ease-in-out infinite, slow-rotation 10s linear infinite;
        }

        /* State Control: Make a text state visible when active */
        .status-text.visible {
            opacity: 1;
            visibility: visible;
        }

        /* --- KEYFRAMES --- */
        
        /* Define the glowing text pulse */
        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(118, 255, 222, 0.6); opacity: 1; }
            50% { text-shadow: 0 0 15px rgba(255, 255, 255, 1), 0 0 30px rgba(118, 255, 222, 0.9); opacity: 0.9; }
        }

        /* Define the slow, subtle rotation in the center of the orb */
        @keyframes slow-rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- BUTTON FOOTER LAYOUT --- */
        .footer {
            width: 100%;
            height: 100px;
            display: grid;
            place-items: center; /* Center the button vertically and horizontally */
            background: linear-gradient(to top, #03011a, rgba(3, 1, 26, 0)); /* subtle gradient lift */
            z-index: 10;
        }

        /* The Main Button Styling */
        #coreActionButton {
            background: transparent;
            color: rgba(118, 255, 222, 0.9); /* Core Cyan Glow color */
            border: 2px solid rgba(118, 255, 222, 0.4);
            padding: 1rem 3rem;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            box-shadow: 0 0 15px rgba(118, 255, 222, 0.1);
        }

        /* Hover Interaction */
        #coreActionButton:hover {
            border-color: rgba(118, 255, 222, 0.8);
            box-shadow: 0 0 25px rgba(118, 255, 222, 0.3);
            color: rgba(118, 255, 222, 1);
            transform: translateY(-2px);
        }

        /* The State: Button when 'Active' (Deactivate mode) */
        #coreActionButton.is-active {
            border-color: rgba(255, 68, 168, 0.4); /* Pink bias from image */
            color: rgba(255, 68, 168, 0.9);
            box-shadow: 0 0 15px rgba(255, 68, 168, 0.1);
        }

        #coreActionButton.is-active:hover {
            border-color: rgba(255, 68, 168, 1);
            box-shadow: 0 0 25px rgba(255, 68, 168, 0.3);
            color: rgba(255, 68, 168, 1);
        }

    </style>
</head>
<body>

    <!-- Main Viewport Context -->
    <div class="app-container">
        
        <!-- Centered Orb Architecture -->
        <div class="orb-stack-container">
            
            <!-- Use your specific generated image (Image 12) -->
            <img src="image_12.png" alt="Multi-colored plasma orb" class="orb-image">
            
            <!-- Data Overlay Layer (Sitting in the absolute center) -->
            <div class="data-overlay-container">
                <div id="stateListening" class="status-text">LISTENING</div>
                <div id="stateThinking" class="status-text">THINKING</div>
                <div id="stateSpeaking" class="status-text">SPEAKING</div>
            </div>

        </div>

    </div>

    <!-- The Action Button (Stuck to bottom) -->
    <div class="footer">
        <button id="coreActionButton" onclick="toggleInterfaceState()">Activate</button>
    </div>

    <script>
        // DOM References
        const button = document.getElementById('coreActionButton');
        const states = {
            listening: document.getElementById('stateListening'),
            thinking: document.getElementById('stateThinking'),
            speaking: document.getElementById('stateSpeaking'),
        };

        let isActive = false; // System starts Deactivated
        let stateCycleInterval = null; // Stores the continuous text cycle loop

        // Primary Function: Handle the button press and Interface State Toggle
        function toggleInterfaceState() {
            isActive = !isActive; // Flip the system state

            if (isActive) {
                // SYSTEM ACTIVATED
                button.innerHTML = "Deactivate"; // Change text
                button.classList.add('is-active'); // Add pink styling state
                startDataCycle(); // Begin cycling text in center
            } else {
                // SYSTEM DEACTIVATED (Back to startup mode)
                button.innerHTML = "Activate"; // Change text back
                button.classList.remove('is-active'); // Revert to cyan styling
                resetDataCycle(); // Instantly hide all text
            }
        }

        // Cycle Logic: This function handles how the text changes over time
        function startDataCycle() {
            resetDataCycle(); // Ensure clean slate before starting

            const sequence = ['listening', 'thinking', 'speaking'];
            let index = 0;

            const cycleData = () => {
                const currentState = sequence[index];

                // Hide all states using visibility helper
                Object.values(states).forEach(el => el.classList.remove('visible'));

                // Show the current state
                states[currentState].classList.add('visible');

                // Advance index and loop back if finished
                index = (index + 1) % sequence.length;
            };

            // Start the cycle IMMEDIATELY on activation
            cycleData();

            // Then set it to repeat every 3 seconds (adjust timing here)
            stateCycleInterval = setInterval(cycleData, 3000);
        }

        // Reset Logic: Instantly hide all text in the orb
        function resetDataCycle() {
            if (stateCycleInterval) {
                clearInterval(stateCycleInterval);
                stateCycleInterval = null;
            }
            // Ensure all states are hidden
            Object.values(states).forEach(el => el.classList.remove('visible'));
        }
    </script>

</body>
    </html>
