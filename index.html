<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova - Voice Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            font-size: 56px;
            margin: 15px 0 8px;
            text-shadow: 0 0 25px rgba(0, 191, 255, 0.9);
        }
        .subtitle {
            font-size: 19px;
            opacity: 0.85;
            margin-bottom: 30px;
        }

        /* Glowing Orb */
        .orb {
            width: 180px;
            height: 180px;
            margin: 30px auto;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 30%, rgba(255,255,255,0.9), #00b8ff 40%, #0077ff);
            box-shadow: 
                0 0 60px #00b8ff,
                0 0 120px #0077ff,
                inset 0 0 40px rgba(255,255,255,0.8);
            transition: all 0.6s ease;
        }

        .orb.listening {
            background: radial-gradient(circle at 40% 30%, rgba(255,255,255,0.95), #00ff9d 40%, #00cc66);
            box-shadow: 
                0 0 80px #00ff9d,
                0 0 160px #00cc66,
                inset 0 0 50px rgba(255,255,255,0.9);
            animation: pulse-listen 1.2s infinite ease-in-out;
        }

        .orb.thinking {
            background: radial-gradient(circle at 40% 30%, rgba(255,255,255,0.9), #ffaa00 40%, #ff6600);
            box-shadow: 
                0 0 70px #ffaa00,
                0 0 140px #ff8800,
                inset 0 0 45px rgba(255,255,255,0.8);
            animation: pulse-think 1.5s infinite ease-in-out;
        }

        .orb.speaking {
            background: radial-gradient(circle at 40% 30%, rgba(255,255,255,0.95), #c44dff 40%, #9900ff);
            box-shadow: 
                0 0 85px #c44dff,
                0 0 170px #aa44ff,
                inset 0 0 55px rgba(255,255,255,0.9);
            animation: pulse-speak 0.8s infinite ease-in-out;
        }

        @keyframes pulse-listen {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }
        @keyframes pulse-think {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        @keyframes pulse-speak {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        button {
            padding: 18px 45px;
            font-size: 24px;
            border-radius: 50px;
            margin: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        #mic-btn {
            background: linear-gradient(45deg, #00ff9d, #00b8ff);
            color: #000;
        }
        #mic-btn:hover { transform: scale(1.08); }
        #deactivate-btn {
            background: #ff2d55;
            color: white;
            display: none;
        }
        #deactivate-btn:hover { background: #ff4d6b; transform: scale(1.05); }

        #status {
            font-size: 23px;
            margin: 25px 0;
            min-height: 55px;
            font-weight: bold;
        }
        .history {
            max-width: 720px;
            margin: 40px auto;
            text-align: left;
            background: rgba(255,255,255,0.08);
            padding: 22px;
            border-radius: 20px;
            max-height: 450px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>
    <h1>🎙️ Nova</h1>
    <p class="subtitle">Intelligent Voice Assistant</p>
    
    <!-- Glowing Orb -->
    <div id="orb" class="orb"></div>
    
    <button id="mic-btn">Activate Nova</button>
    <button id="deactivate-btn">Deactivate Nova</button>
    
    <p id="status">Ready • Tap Activate to start</p>
    
    <div class="history" id="history"></div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.lang = 'en-IN';

        let conversationHistory = [];
        let isActive = false;

        const micBtn = document.getElementById('mic-btn');
        const deactivateBtn = document.getElementById('deactivate-btn');
        const status = document.getElementById('status');
        const historyDiv = document.getElementById('history');
        const orb = document.getElementById('orb');

        function setOrbState(state) {
            orb.className = 'orb ' + state;
        }

        function toggleActivate() {
            if (!isActive) {
                isActive = true;
                micBtn.style.display = 'none';
                deactivateBtn.style.display = 'inline-block';
                status.innerText = '✅ Nova Activated';
                setOrbState('listening');
                startListening();
            }
        }

        function deactivate() {
            isActive = false;
            micBtn.style.display = 'inline-block';
            deactivateBtn.style.display = 'none';
            status.innerText = 'Deactivated • Tap Activate to restart';
            setOrbState('');
            window.speechSynthesis.cancel();
        }

        function startListening() {
            if (!isActive) return;
            status.innerText = '🎤 Listening...';
            setOrbState('listening');
            recognition.start();
        }

        micBtn.addEventListener('click', toggleActivate);
        deactivateBtn.addEventListener('click', deactivate);

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript.trim();
            addToHistory('You: ' + transcript);
            status.innerText = 'Nova is thinking...';
            setOrbState('thinking');

            try {
                const response = await fetch('http://192.168.1.64:5000/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: transcript, 
                        history: conversationHistory 
                    })
                });

                if (!response.ok) throw new Error('Backend error');
                const data = await response.json();
                
                status.innerText = 'Nova is speaking...';
                setOrbState('speaking');

                const utterance = new SpeechSynthesisUtterance(data.reply);
                utterance.lang = 'en-IN';
                utterance.pitch = 0.95;
                utterance.rate = 0.93;
                window.speechSynthesis.speak(utterance);
                
                addToHistory('Nova: ' + data.reply);
                
                // Auto listen again after speaking
                if (isActive) {
                    setTimeout(() => {
                        status.innerText = '✅ Nova Activated';
                        setOrbState('listening');
                        startListening();
                    }, 1200);
                }
            } catch (err) {
                status.innerText = '❌ Connection error • Check nova_brain.py';
                setOrbState('');
            }
        };

        function addToHistory(text) {
            conversationHistory.push(text);
            if (conversationHistory.length > 15) conversationHistory.shift();
            historyDiv.innerHTML = conversationHistory.map(msg => `<p>${msg}</p>`).join('');
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }
    </script>
</body>
    </html>
