<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: #020210; 
            /* LOCK THE BACKGROUND IMAGE HERE */
            background-image: url('1776185658997.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh; width: 100vw; 
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* THE ROBOT CONTAINER - Only this part will move */
        #nova-stage { 
            position: relative;
            width: 100%; height: 100%;
            z-index: 10;
        }

        .layer { 
            position: absolute; width: 100%; height: 100%; 
            /* contain ensures the robot doesn't get cut off */
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center;
            opacity: 0; transition: opacity 0.5s ease;
        }

        /* --- MAPPING YOUR FILES --- */
        #charging { background-image: url('1776185658997.png'); opacity: 1; }
        #shatter { background-image: url('1776185647325.png'); }
        #talking { background-image: url('1776257394473.png'); }
        #thinking { background-image: url('1776257407074.png'); }
        #listening { background-image: url('1776257419064.png'); }

        /* DRIVING THE ROBOT (Only Nova moves, not the stars) */
        @keyframes robotOnlyDrift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -30px); }
        }
        .floating { animation: robotOnlyDrift 7s infinite ease-in-out; }

        #ui { position: fixed; bottom: 40px; z-index: 100; display: flex; gap: 10px; }
        
        button { 
            padding: 12px 25px; border-radius: 50px; border: 2px solid #00d2ff; 
            background: rgba(0, 0, 0, 0.85); color: #00d2ff; 
            cursor: pointer; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }
    </style>
</head>
<body>

    <div id="nova-stage">
        <div id="charging" class="layer"></div>
        <div id="shatter" class="layer"></div>
        <div id="listening" class="layer"></div>
        <div id="thinking" class="layer"></div>
        <div id="talking" class="layer"></div>
    </div>

    <div id="ui">
        <button id="act-btn" onclick="activate()">Activate Nova</button>
        <button id="ask-btn" onclick="askNova()" style="display:none;">Ask Nova</button>
        <button id="deact-btn" onclick="deactivate()" style="display:none;">Deactivate</button>
    </div>

    <script>
        const layers = document.querySelectorAll('.layer');
        const stage = document.getElementById('nova-stage');

        function setLayer(id) {
            layers.forEach(l => l.style.opacity = "0");
            document.getElementById(id).style.opacity = "1";
        }

        function speak(text, callback) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0; 
            utterance.pitch = 1.1; 
            utterance.onend = callback;
            window.speechSynthesis.speak(utterance);
        }

        function activate() {
            setLayer('shatter'); // Cracks appear
            document.getElementById('act-btn').style.display = "none";
            speak("Nova system active.", () => {
                setLayer('listening');
                stage.classList.add('floating');
                document.getElementById('ask-btn').style.display = "block";
                document.getElementById('deact-btn').style.display = "block";
            });
        }

        function deactivate() {
            stage.classList.remove('floating');
            speak("Entering sleep mode.", () => {
                setLayer('charging'); // Back to full shield
                document.getElementById('act-btn').style.display = "block";
                document.getElementById('ask-btn').style.display = "none";
                document.getElementById('deact-btn').style.display = "none";
            });
        }

        function askNova() {
            stage.style.animationPlayState = "paused";
            setLayer('listening');
            
            setTimeout(() => {
                setLayer('thinking');
                setTimeout(() => {
                    setLayer('talking');
                    speak("I am here to help you. What would you like to know today?", () => {
                        setLayer('listening');
                        stage.style.animationPlayState = "running";
                    });
                }, 2000);
            }, 2000);
        }
    </script>
</body>
</html>
